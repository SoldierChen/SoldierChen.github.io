intro:
  en:
    - >-
      We are building **CLab**, a collaborative group working on AI accelerators, LLM systems,
      graph analytics, and customized computing.
    - >-
      Interested in joining us as a PhD student, MPhil student, or research assistant?
      Please [reach out by email](mailto:xinyuchen@hkust-gz.edu.cn).
  zh:
    - >-
      我们正在建设 **CLab**，研究方向包括人工智能加速器、大模型系统、图计算和定制计算。
    - >-
      欢迎有意申请博士、MPhil 或研究助理的同学通过[邮件联系](mailto:xinyuchen@hkust-gz.edu.cn)。

