biography:
  en:
    title: Biography
    paragraphs:
      - >-
        I am an Assistant Professor in the Microelectronics Thrust at
        [The Hong Kong University of Science and Technology (Guangzhou)](https://www.hkust-gz.edu.cn/).
        Before joining HKUST(GZ), I was a Principal Engineer at Hisilicon, working on next-generation DPUs.
        I received my Ph.D. in computer science from the National University of Singapore (NUS) in 2022,
        where I was supervised by [Prof. Bingsheng He](https://www.comp.nus.edu.sg/~hebs/)
        and collaborated closely with [Prof. Weng-Fai Wong](https://www.comp.nus.edu.sg/~wongwf/)
        and [Prof. Deming Chen](https://dchen.ece.illinois.edu/).
      - >-
        I lead the **Custom Computing Lab (CLab)** at HKUST(GZ). Our group develops sustainable
        computing solutions for AI and big data through customized hardware architectures and specialized system designs.
  zh:
    title: 个人简介
    paragraphs:
      - >-
        我是[香港科技大学（广州）](https://www.hkust-gz.edu.cn/)微电子学域助理教授。
        加入香港科技大学（广州）之前，我曾任华为海思主任工程师，参与下一代 DPU 的研发。
        我于 2022 年获得新加坡国立大学计算机科学博士学位，导师为
        [Bingsheng He 教授](https://www.comp.nus.edu.sg/~hebs/)，并与
        [Weng-Fai Wong 教授](https://www.comp.nus.edu.sg/~wongwf/)和
        [Deming Chen 教授](https://dchen.ece.illinois.edu/)密切合作。
      - >-
        我在香港科技大学（广州）负责**定制计算实验室（CLab）**。
        团队围绕人工智能与大数据应用，研究可持续的定制硬件体系结构与专用系统设计。

